stages:
  - build

variables:
  REGISTRY: $CI_REGISTRY
  IMAGE_NAME: $CI_REGISTRY_IMAGE

.build-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_BRANCH =~ /^(release|canary|develop)$/

build-service:
  extends: .build-image
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" = "develop" ]; then
        BRAND_FLAVOR="blue"
      else
        BRAND_FLAVOR="red"
      fi

      docker build \
        --build-arg BRAND_FLAVOR=$BRAND_FLAVOR \
        --build-arg LOCALIZE_API_KEY=${LOCALIZE_API_KEY:-} \
        -f Dockerfile \
        -t $IMAGE_NAME:$CI_COMMIT_REF_SLUG \
        -t $IMAGE_NAME:$CI_COMMIT_SHORT_SHA \
        -t $IMAGE_NAME:latest \
        .
      docker push --all-tags $IMAGE_NAME

build-migrations:
  extends: .build-image
  script:
    - |
      docker build \
        -f Dockerfile.migrate \
        -t $IMAGE_NAME-migrations:$CI_COMMIT_REF_SLUG \
        -t $IMAGE_NAME-migrations:$CI_COMMIT_SHORT_SHA \
        -t $IMAGE_NAME-migrations:latest \
        .
      docker push --all-tags $IMAGE_NAME-migrations

build-backup:
  extends: .build-image
  script:
    - |
      docker build \
        -f Dockerfile.backup \
        -t $IMAGE_NAME-backup:$CI_COMMIT_REF_SLUG \
        -t $IMAGE_NAME-backup:$CI_COMMIT_SHORT_SHA \
        -t $IMAGE_NAME-backup:latest \
        .
      docker push --all-tags $IMAGE_NAME-backup
